<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyhetsrapport</title>
  <link rel="stylesheet" href="{{BASE}}/style.css">
</head>
<body>
  <header>
    <span class="logo">Nyheter</span>
    <nav><a href="{{BASE}}/login" class="btn btn-ghost">Logga in</a></nav>
  </header>

  <main id="main">
    <div id="loading" class="card">Laddar...</div>
  </main>

  <script>
    const BASE = '{{BASE}}';
    const slug = location.pathname.split('/').pop();

    function formatDate(str) {
      return new Date(str + 'Z').toLocaleString('sv-SE', {
        year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Stockholm'
      });
    }

    function md(text) {
      const lines = text.split('\n');
      let html = '';
      let inTable = false;
      let tableHtml = '';
      let tableRowCount = 0;

      function flushTable() {
        if (tableHtml) { html += '<div class="table-wrap"><table>' + tableHtml + '</table></div>'; }
        tableHtml = ''; inTable = false; tableRowCount = 0;
      }

      function processInline(s) {
        return s
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
          .replace(/(^|[\s(])(https?:\/\/[^\s)<]+)/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');
      }

      let paraLines = [];
      function flushPara() {
        if (paraLines.length) { html += '<p>' + paraLines.map(processInline).join('<br>') + '</p>'; paraLines = []; }
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        if (line.trim().startsWith('|')) {
          flushPara();
          inTable = true;
          const cells = line.trim().replace(/^\||\|$/g, '').split('|').map(c => c.trim());
          if (line.includes('---')) {
            // separator-rad, hoppa
          } else if (tableRowCount === 0) {
            tableHtml += '<thead><tr>' + cells.map(c => `<th>${processInline(c)}</th>`).join('') + '</tr></thead><tbody>';
            tableRowCount++;
          } else {
            tableHtml += '<tr>' + cells.map(c => `<td>${processInline(c)}</td>`).join('') + '</tr>';
            tableRowCount++;
          }
          continue;
        } else if (inTable) {
          tableHtml += '</tbody>';
          flushTable();
        }

        if (!line.trim()) { flushPara(); continue; }
        if (/^#{1,4} /.test(line)) {
          flushPara();
          const level = line.match(/^(#+)/)[1].length;
          html += `<h${level}>${processInline(line.replace(/^#+\s+/, ''))}</h${level}>`;
          continue;
        }
        if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) {
          flushPara();
          html += `<li>${processInline(line.trim().slice(2))}</li>`;
          continue;
        }
        if (line.trim().startsWith('> ')) {
          flushPara();
          html += `<blockquote>${processInline(line.trim().slice(2))}</blockquote>`;
          continue;
        }
        if (line.trim() === '---' || line.trim() === '***') {
          flushPara(); html += '<hr>'; continue;
        }
        paraLines.push(line);
      }
      if (inTable) { tableHtml += '</tbody>'; flushTable(); }
      flushPara();
      return html;
    }

    async function load() {
      const res = await fetch(`${BASE}/api/r/${slug}`);
      const main = document.getElementById('main');

      if (!res.ok) {
        main.innerHTML = '<div class="card"><p>Rapporten hittades inte.</p></div>';
        return;
      }

      const { job, reports } = await res.json();
      document.title = `${job.topic} – Nyheter`;

      if (reports.length === 0) {
        main.innerHTML = `<div class="card"><h2>${job.topic}</h2><p>Ingen rapport genererad ännu.</p></div>`;
        return;
      }

      const latest = reports[0];
      const history = reports.slice(1);

      let html = `
        <div class="card report-card">
          <div class="report-meta">
            <h1>${job.topic}</h1>
            <span class="report-date">${formatDate(latest.generated_at)}</span>
          </div>
          <div class="report-body">${md(latest.content)}</div>
        </div>
      `;

      if (history.length > 0) {
        html += '<div class="card"><h3>Tidigare rapporter</h3><ul class="history-list">';
        history.forEach(r => {
          html += `<li><button class="btn-link" onclick="expandReport(this)" data-content="${encodeURIComponent(r.content)}">${formatDate(r.generated_at)}</button><div class="history-body" hidden></div></li>`;
        });
        html += '</ul></div>';
      }

      main.innerHTML = html;
    }

    window.expandReport = function(btn) {
      const div = btn.nextElementSibling;
      if (div.hidden) {
        div.innerHTML = md(decodeURIComponent(btn.dataset.content));
        div.hidden = false;
        btn.textContent = '▲ ' + btn.textContent.replace(/^▼ /, '');
      } else {
        div.hidden = true;
        btn.textContent = btn.textContent.replace(/^▲ /, '');
      }
    };

    load();
  </script>
</body>
</html>
